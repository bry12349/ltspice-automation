interface:
  display_name: "LTspice Automation"
  short_description: "Verify LTspice/ngspice circuits, Buck converters, and sweeps."
  brand_color: "#2563EB"
  default_prompt: "Use $ltspice-automation to simulate a bounded circuit, export its waveform, or run a supported parameter sweep."

dependencies:
  tools:
    - type: "mcp"
      value: "ltspice-automation"
      description: "Local MCP server for LTspice/ngspice simulation, waveform export, parameter sweeps, and engineering reports."

policy:
  allow_implicit_invocation: true
